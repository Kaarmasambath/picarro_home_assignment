name: CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run API Tests
        run: mvn clean test -DsuiteXmlFile=src/test/resources/testng-api.xml

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-reports
          path: |
            target/surefire-reports/
            ExtentReport/

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run UI Tests
        run: mvn clean test -DsuiteXmlFile=src/test/resources/testng-ui.xml -Dbrowser.headless=true
        continue-on-error: true

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-reports
          path: |
            target/surefire-reports/
            ExtentReport/

  all-tests:
    name: All Tests
    runs-on: ubuntu-latest
    needs: [api-tests]
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run All Tests
        run: mvn clean test -DsuiteXmlFile=src/test/resources/testng.xml -Dbrowser.headless=true
        continue-on-error: true

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: all-test-reports
          path: |
            target/surefire-reports/
            ExtentReport/

      - name: Upload ExtentReport
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: extent-report
          path: ExtentReport/ExtentReportResults.html
